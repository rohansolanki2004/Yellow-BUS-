## database: storage/production.sqlite3
default: &default
  adapter: postgresql
  encoding: unicode
  username: developer
  password: password
  host: localhost
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: yellow_bus_development

test:
  <<: *default
  database: yellow_bus_test

production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>